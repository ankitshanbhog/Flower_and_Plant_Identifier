<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotaniScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d6a4f; --accent: #95d5b2; --bg: #f8faf9; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #333; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 10px; font-weight: 600; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        
        /* Image Preview Box */
        .upload-area { border: 2px dashed var(--accent); border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s; position: relative; background: #fff; display: block; }
        .upload-area:hover { background: #f1f8f5; border-color: var(--primary); }
        #preview { width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; }
        
        /* Buttons and Inputs */
        input[type="file"] { display: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 1rem; cursor: pointer; width: 100%; transition: transform 0.2s; border: none; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Result Card */
        #result-card { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; animation: fadeIn 0.5s ease; text-align: left; }
        .success { background: #e9f5ee; border: 1px solid var(--accent); color: #1b4332; }
        .uncertain { background: #fff3f3; border: 1px solid #ffccd5; color: #c9184a; text-align: center !important; }
        
        .sci-name { font-style: italic; color: #40916c; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .desc { font-size: 0.85rem; line-height: 1.4; color: #444; margin-top: 10px; }
        .conf-badge { font-size: 0.75rem; background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 10px; float: right; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 BotaniScan</h1>
    <p>Identify 15 types of medicinal plants and flowers instantly.</p>

    <label class="upload-area" for="imageInput">
        <img id="preview" src="#" alt="Image Preview">
        <span id="upload-text">Click to Select Photo</span>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
    </label>

    <div class="loader" id="loader"></div>
    <div id="result-card"></div>

    <button class="btn" id="predictBtn" onclick="uploadImage()" style="margin-top: 20px;">Identify Species</button>
</div>

<script>
    function previewImage(event) {
        const preview = document.getElementById('preview');
        const uploadText = document.getElementById('upload-text');
        if(event.target.files[0]) {
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.style.display = 'block';
            uploadText.style.display = 'none';
            document.getElementById('result-card').style.display = 'none';
        }
    }

    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const card = document.getElementById('result-card');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('predictBtn');

        if (!fileInput.files[0]) return alert("Please select a file first!");

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        loader.style.display = 'block';
        card.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();

            loader.style.display = 'none';
            btn.disabled = false;
            card.style.display = 'block';

            if (data.label === "Uncertain") {
                card.className = "uncertain";
                card.innerHTML = `<strong>⚠️ ${data.label}</strong><br><small>${data.message} (${data.confidence.toFixed(1)}%)</small>`;
            } else {
                card.className = "success";
                card.innerHTML = `
                    <span class="conf-badge">${data.confidence.toFixed(1)}% Match</span>
                    <strong style="font-size: 1.2rem;">🌱 ${data.label}</strong>
                    <span class="sci-name">${data.scientific}</span>
                    <div class="desc">${data.desc}</div>
                `;
            }
        } catch (error) {
            loader.style.display = 'none';
            btn.disabled = false;
            alert("Error connecting to server. Make sure your Flask app is running!");
        }
    }
</script>

</body>
</html>
